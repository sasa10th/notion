<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meal</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #ffffff;
      --fg: #191919;
      --muted: #999999;
      --line: #191919;
      --surface: #F8F8F7;
      --border: #EBEBE9;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #191919;
        --fg: #ffffff;
        --muted: #666666;
        --line: #ffffff;
        --surface: #111111;
        --border: #2a2a2a;
      }
    }

    [data-theme="light"] {
      --bg: #ffffff;
      --fg: #191919;
      --muted: #999999;
      --line: #191919;
      --surface: #F8F8F7;
      --border: #EBEBE9;
    }

    [data-theme="dark"] {
      --bg: #191919;
      --fg: #ffffff;
      --muted: #666666;
      --line: #ffffff;
      --surface: #111111;
      --border: #2a2a2a;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: sans-serif;
      font-size: clamp(11px, 1.2vw, 15px);
      transition: background 0.3s, color 0.3s;
    }

    .wrap {
      padding: 16px 18px 14px;
    }

    .header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 10px;
    }

    .title {
      font-family: 'Bebas Neue', Impact, sans-serif;
      font-size: clamp(18px, 4vw, 36px);
      letter-spacing: 0.05em;
      line-height: 1;
    }

    /* tabs */
    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 10px;
    }

    .tab {
      font-family: 'Courier New', monospace;
      font-size: clamp(9px, 1.1vw, 11px);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
      background: none;
      border: none;
      border-bottom: 1px solid transparent;
      cursor: pointer;
      padding: 0 0 5px 0;
      margin-right: clamp(12px, 2.5vw, 24px);
      transition: color .15s, border-color .15s;
    }

    .tab.active {
      color: var(--fg);
      border-bottom-color: var(--fg);
    }

    .tab:hover:not(.active) {
      color: var(--fg);
      opacity: .6;
    }

    /* day tabs */
    .day-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 10px;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .day-tabs::-webkit-scrollbar {
      display: none;
    }

    .day-tab {
      font-family: 'Bebas Neue', Impact, sans-serif;
      font-size: clamp(13px, 2vw, 18px);
      letter-spacing: 0.08em;
      color: var(--muted);
      background: none;
      border: none;
      border-bottom: 1px solid transparent;
      cursor: pointer;
      padding: 0 0 4px 0;
      margin-right: clamp(10px, 2vw, 20px);
      transition: color .12s;
      white-space: nowrap;
    }

    .day-tab.active {
      color: var(--fg);
      border-bottom-color: var(--fg);
    }

    .day-tab:hover:not(.active) {
      opacity: .6;
      color: var(--fg);
    }

    /* table */
    .table-wrap {
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }

    table {
      border-collapse: collapse;
      width: 100%;
    }

    th,
    td {
      border: 1px solid var(--border);
      padding: 7px 10px;
      text-align: left;
      vertical-align: top;
      word-break: break-word;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.7;
    }

    th {
      font-family: 'Bebas Neue', Impact, sans-serif;
      font-size: clamp(11px, 1.5vw, 15px);
      letter-spacing: 0.08em;
      font-weight: 400;
      background: var(--surface);
      color: var(--muted);
      width: 60px;
      white-space: nowrap;
    }

    .cal {
      display: block;
      font-family: 'Courier New', monospace;
      font-size: clamp(8px, .9vw, 10px);
      letter-spacing: .1em;
      color: var(--muted);
      margin-top: 4px;
    }

    /* status */
    .status {
      padding: 20px 0 8px;
      font-family: 'Courier New', monospace;
      font-size: clamp(9px, 1.1vw, 11px);
      letter-spacing: .25em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .blink {
      animation: bl 1s step-end infinite;
    }

    @keyframes bl {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .2
      }
    }

    .debug {
      display: block;
      font-size: 9px;
      opacity: .5;
      margin-top: 4px;
      word-break: break-all;
    }

    /* footer */
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
    }

    .footer-label {
      font-family: 'Courier New', monospace;
      font-size: clamp(8px, .9vw, 10px);
      letter-spacing: .2em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .refresh {
      background: none;
      border: none;
      font-family: 'Courier New', monospace;
      font-size: clamp(8px, .9vw, 10px);
      letter-spacing: .2em;
      color: var(--muted);
      cursor: pointer;
      text-transform: uppercase;
      transition: color .12s;
    }

    .refresh:hover {
      color: var(--fg);
    }

    /* theme toggle */
    .toggle {
      position: fixed;
      top: 16px;
      right: 18px;
      background: none;
      border: 1px solid var(--line);
      color: var(--fg);
      font-family: 'Courier New', monospace;
      font-size: 11px;
      letter-spacing: .2em;
      padding: 5px 10px;
      cursor: pointer;
      opacity: .4;
      transition: opacity .2s;
    }

    .toggle:hover {
      opacity: 1;
    }
  </style>
</head>

<body>
  <button class="toggle" id="toggle" onclick="cycleTheme()">●</button>

  <div class="wrap">
    <div class="header">
      <div class="title">SASA MEAL</div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="setView('today',this)">Today</button>
      <button class="tab" onclick="setView('week',this)">Week</button>
    </div>

    <div id="view-today">
      <div class="status"><span class="blink">Loading ···</span></div>
    </div>

    <div id="view-week" style="display:none">
      <div class="day-tabs" id="day-tabs"></div>
      <div id="week-content">
        <div class="status"><span class="blink">Loading ···</span></div>
      </div>
    </div>

    <div class="footer">
      <span class="footer-label">NEIS Open API</span>
      <button class="refresh" onclick="reload()">↻ Refresh</button>
    </div>
  </div>

  <script>
    let API_KEY = localStorage.getItem('neis_key') || 'f2e20c38f04e46e1a503100142a0d240';
    const ATPT = 'I10';
    const SCHOOL = '9300181';
    const BASE = 'https://open.neis.go.kr/hub/mealServiceDietInfo';

    const DAY_EN = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
    const DAY_KO = ['일', '월', '화', '수', '목', '금', '토'];
    const MTYPE = { '1': '조식', '2': '중식', '3': '석식' };

    const today = new Date();
    let currentView = 'today';
    let weekData = {};
    let selYMD = null;

    const pad = n => String(n).padStart(2, '0');
    const toYMD = d => `${d.getFullYear()}${pad(d.getMonth() + 1)}${pad(d.getDate())}`;
    const toDisp = d => `${d.getFullYear()} . ${pad(d.getMonth() + 1)} . ${pad(d.getDate())}  ${DAY_EN[d.getDay()]}`;

    async function fetchMeal(extra) {
      const url = `${BASE}?KEY=${API_KEY}&Type=json`
        + `&ATPT_OFCDC_SC_CODE=${ATPT}&SD_SCHUL_CODE=${SCHOOL}`
        + `&${extra}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const json = await res.json();
      if (json.RESULT) return [];
      return json?.mealServiceDietInfo?.[1]?.row || [];
    }

    function parseItems(raw) {
      return (raw || '').split('<br/>')
        .map(s => s.replace(/\s*[\d]+(\.\d+)*\.?\s*/g, ' ').replace(/\s+/g, ' ').trim())
        .filter(Boolean);
    }

    function renderTable(meals, targetId) {
      const el = document.getElementById(targetId);
      if (!meals || meals.length === 0) {
        el.innerHTML = '<div class="status">급식 정보 없음</div>';
        return;
      }
      const map = {};
      meals.forEach(m => map[m.MMEAL_SC_CODE] = m);

      let rows = '';
      ['1', '2', '3'].forEach(type => {
        const m = map[type];
        if (!m) return;
        const items = parseItems(m.DDISH_NM);
        const cal = (m.CAL_INFO || '').trim();
        rows += `<tr>
          <th>${MTYPE[type]}</th>
          <td>
            ${items.join(' · ')}
            ${cal ? `<span class="cal">${cal}</span>` : ''}
          </td>
        </tr>`;
      });

      el.innerHTML = `<div class="table-wrap"><table><tbody>${rows}</tbody></table></div>`;
    }

    async function loadToday() {
      const el = document.getElementById('view-today');
      el.innerHTML = '<div class="status"><span class="blink">Loading ···</span></div>';
      try {
        const meals = await fetchMeal('MLSV_YMD=' + toYMD(today));
        renderTable(meals, 'view-today');
      } catch (e) {
        el.innerHTML = `<div class="status">오류<span class="debug">${e.message}</span></div>`;
      }
    }

    async function loadWeek() {
      const el = document.getElementById('week-content');
      el.innerHTML = '<div class="status"><span class="blink">Loading ···</span></div>';
      try {
        const mon = new Date(today);
        const dow = today.getDay();
        mon.setDate(today.getDate() - (dow === 0 ? 6 : dow - 1));
        const days = Array.from({ length: 5 }, (_, i) => {
          const d = new Date(mon); d.setDate(mon.getDate() + i); return d;
        });
        const from = toYMD(days[0]), to = toYMD(days[4]);
        const meals = await fetchMeal(`MLSV_FROM_YMD=${from}&MLSV_TO_YMD=${to}&pSize=50`);

        weekData = {};
        days.forEach(d => weekData[toYMD(d)] = []);
        meals.forEach(m => { if (weekData[m.MLSV_YMD]) weekData[m.MLSV_YMD].push(m); });

        const todayYMD = toYMD(today);
        document.getElementById('day-tabs').innerHTML = days.map(d => {
          const k = toYMD(d);
          return `<button class="day-tab ${k === todayYMD ? 'active' : ''}" onclick="selDay('${k}',this)">${DAY_KO[d.getDay()]} ${d.getDate()}</button>`;
        }).join('');

        selYMD = weekData[todayYMD] !== undefined ? todayYMD : toYMD(days[0]);
        renderTable(weekData[selYMD] || [], 'week-content');
      } catch (e) {
        el.innerHTML = `<div class="status">오류<span class="debug">${e.message}</span></div>`;
      }
    }

    function selDay(k, btn) {
      selYMD = k;
      document.querySelectorAll('.day-tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      renderTable(weekData[k] || [], 'week-content');
    }

    function setView(v, btn) {
      currentView = v;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('view-today').style.display = v === 'today' ? '' : 'none';
      document.getElementById('view-week').style.display = v === 'week' ? '' : 'none';
      if (v === 'week' && Object.keys(weekData).length === 0) loadWeek();
    }

    function reload() {
      weekData = {};
      loadToday();
      if (currentView === 'week') loadWeek();
    }

    const themes = ['auto', 'light', 'dark'];
    let ti = 0;
    function cycleTheme() {
      ti = (ti + 1) % themes.length;
      const t = themes[ti];
      const btn = document.getElementById('toggle');
      if (t === 'auto') { document.documentElement.removeAttribute('data-theme'); btn.textContent = '●'; }
      else if (t === 'light') { document.documentElement.setAttribute('data-theme', 'light'); btn.textContent = '○'; }
      else { document.documentElement.setAttribute('data-theme', 'dark'); btn.textContent = '◉'; }
    }

    function showKeyPrompt() {
      document.getElementById('view-today').innerHTML = `
        <div style="padding:14px 0 8px">
          <div style="font-family:'Courier New',monospace;font-size:clamp(9px,1.1vw,11px);
            letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:10px">
            NEIS 인증키 필요
          </div>
          <div style="display:flex;gap:6px;align-items:center">
            <input id="key-input" type="text" placeholder="발급받은 인증키 입력..."
              style="flex:1;background:var(--surface);border:1px solid var(--border);
              color:var(--fg);font-family:'Courier New',monospace;
              font-size:clamp(9px,1.1vw,11px);letter-spacing:.05em;
              padding:7px 10px;outline:none;min-width:0">
            <button onclick="saveKey()"
              style="background:none;border:1px solid var(--line);color:var(--fg);
              font-family:'Courier New',monospace;font-size:clamp(9px,1.1vw,11px);
              letter-spacing:.2em;text-transform:uppercase;padding:7px 12px;
              cursor:pointer;white-space:nowrap;opacity:.6;transition:opacity .15s"
              onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=.6">저장</button>
          </div>
          <div style="font-family:'Courier New',monospace;font-size:clamp(8px,.9vw,9px);
            letter-spacing:.1em;color:var(--muted);margin-top:8px">
            open.neis.go.kr → 인증키 신청 (무료·즉시)
          </div>
        </div>`;
      setTimeout(() => {
        const inp = document.getElementById('key-input');
        if (inp) inp.addEventListener('keydown', e => { if (e.key === 'Enter') saveKey(); });
      }, 50);
    }

    function saveKey() {
      const inp = document.getElementById('key-input');
      const val = (inp ? inp.value : '').trim();
      if (!val) return;
      API_KEY = val;
      try { localStorage.setItem('neis_key', val); } catch (e) { }
      loadToday();
    }

    if (API_KEY) loadToday();
    else showKeyPrompt();
  </script>
</body>

</html>
